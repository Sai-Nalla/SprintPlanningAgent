# ==============================================================================
# Sprint Planning Agent - Module 8 standalone configuration
# PostgreSQL + pgvector kept for RAG/vector-search compatibility
# ==============================================================================

spring.application.name=sprint-planning-agent
server.port=8081

# PostgreSQL + pgvector
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_ecommerce}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Spring AI OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.embedding.options.model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

# PgVector vector store
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=1536
# spring.ai.vectorstore.pgvector.table-name=vector_store
# spring.ai.vectorstore.pgvector.schema-name=public

# Logging
logging.level.root=INFO
logging.level.com.sai.ai_chatbot=INFO
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.jdbc=WARN

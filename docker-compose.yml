version: '3.8'

services:
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: sprint-agent-pgvector
    environment:
      POSTGRES_DB: ai_ecommerce
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ai_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sprint-agent-network

  sprint-planning-agent:
    build: .
    container_name: sprint-planning-agent
    depends_on:
      postgres-pgvector:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-pgvector:5432/ai_ecommerce
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
    ports:
      - "8081:8081"
    networks:
      - sprint-agent-network

volumes:
  pgvector_data:
    driver: local

networks:
  sprint-agent-network:
    driver: bridge
